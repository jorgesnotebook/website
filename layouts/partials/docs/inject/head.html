<style>
/* ── Colour palette from JN logo ── */
:root {
  --nb-purple:       #7040A0;
  --nb-purple-light: #9060C0;
  --nb-purple-dark:  #4A2870;
  --nb-gold:         #C9A843;
  --nb-gold-light:   #DFC06A;
  --nb-gold-dark:    #9A7E2E;
  --nb-bg:           #0a0a0f;
  --nb-bg-card:      #111118;
  --nb-border:       #1e1e2a;
  --nb-text:         #9ca3af;
  --nb-text-light:   #e5e7eb;
  --nb-text-muted:   #6b7280;

  --color-link:         var(--nb-purple);
  --color-visited-link: var(--nb-purple-dark);
}

@media (prefers-color-scheme: dark) {
  :root {
    --body-background:    var(--nb-bg);
    --body-font-color:    var(--nb-text);
    --color-link:         var(--nb-purple-light);
    --color-visited-link: var(--nb-purple);
    --gray-100:           var(--nb-bg-card);
    --gray-200:           var(--nb-border);
    --gray-500:           var(--nb-text-muted);
  }

  .book-menu .book-menu-content,
  .book-search input {
    background: var(--nb-bg-card);
  }

  h1, h2, h3 {
    color: var(--nb-text-light);
  }

  a:hover {
    color: var(--nb-purple-light);
  }

  code, pre {
    background: #0d0d14;
  }

  /* Tone down bright white-background images in dark mode */
  .markdown img {
    filter: brightness(0.88) contrast(1.05);
    border-radius: .25rem;
  }
}

/* ── Language switcher ── */
.nb-lang-switcher {
  display: flex;
  align-items: center;
  gap: .5rem;
  padding: .75rem 0 .25rem;
  font-size: .8rem;
}

.nb-lang {
  color: var(--nb-text-muted);
  text-decoration: none;
  transition: color .2s;
}

.nb-lang:hover {
  color: var(--nb-purple-light);
}

.nb-lang-active {
  color: var(--nb-purple);
  font-weight: 700;
  cursor: default;
}

@media (prefers-color-scheme: dark) {
  .nb-lang-active { color: var(--nb-purple-light); }
}

.nb-lang-switcher .nb-lang + .nb-lang::before,
.nb-lang-switcher .nb-lang-active + .nb-lang::before,
.nb-lang-switcher .nb-lang + .nb-lang-active::before {
  content: "/";
  margin-right: .5rem;
  color: var(--nb-text-muted);
}

/* ── Text selection ── */
::selection {
  background: var(--nb-purple);
  color: #fff;
}

::-moz-selection {
  background: var(--nb-purple);
  color: #fff;
}

/* ── Typography ── */
body {
  font-family: 'Roboto', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  line-height: 1.75;
}

.book-page {
  max-width: 740px;
}

/* ── Sidebar logo: preserve colours, never invert ── */
.book-brand img.book-icon {
  height: 2.2rem;
  width:  2.2rem;
  filter: none !important;
}

/* ── Hero ── */
.nb-hero {
  padding: 3rem 0 2.5rem;
  margin-bottom: 2.5rem;
}

.nb-hero-name {
  font-size: 2.4rem;
  font-weight: 900;
  letter-spacing: .05rem;
  background: linear-gradient(90deg, var(--nb-purple) 0%, var(--nb-gold) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin: 0 0 .4rem;
}

.nb-hero-badge {
  font-size: 1rem;
  font-weight: 300;
  color: var(--nb-gold);
  margin-bottom: 1.2rem;
  letter-spacing: .08rem;
}

.nb-hero-desc {
  font-size: .95rem;
  max-width: 560px;
  line-height: 1.7;
  margin-bottom: 1.5rem;
  color: var(--body-font-color);
}

.nb-hero-links {
  display: flex;
  flex-wrap: wrap;
  gap: .6rem;
  margin-bottom: 1.5rem;
}

/* Primary button: purple */
.nb-btn {
  display: inline-block;
  padding: .45rem 1.1rem;
  border-radius: .35rem;
  font-size: .85rem;
  font-weight: 600;
  background: var(--nb-purple);
  color: #fff !important;
  text-decoration: none;
  transition: background .2s;
}

.nb-btn:hover {
  background: var(--nb-purple-light);
  color: #fff !important;
}

/* Outline button: purple border */
.nb-btn-outline {
  background: transparent;
  border: 1px solid var(--nb-purple);
  color: var(--nb-purple) !important;
}

.nb-btn-outline:hover {
  background: var(--nb-purple);
  color: #fff !important;
}

@media (prefers-color-scheme: dark) {
  .nb-btn-outline {
    border-color: var(--nb-purple-light);
    color: var(--nb-purple-light) !important;
  }
  .nb-btn-outline:hover {
    background: var(--nb-purple-light);
    color: #fff !important;
  }
}

/* ── Stack tags: gold outline, decorative only ── */
.nb-hero-stack {
  display: flex;
  flex-wrap: wrap;
  gap: .4rem;
}

.nb-tag {
  font-size: .75rem;
  padding: .2rem .65rem;
  border-radius: 9999px;
  border: 1px solid var(--nb-gold-dark);
  color: var(--nb-text-muted, #6b7280);
  background: transparent;
}

@media (prefers-color-scheme: dark) {
  .nb-tag {
    border-color: var(--nb-gold-dark);
    color: var(--nb-text-muted);
    background: rgba(201, 168, 67, .05);
  }
}

/* ── Sections ── */
.nb-section {
  margin-bottom: 3rem;
}

.nb-section-title {
  font-size: 1rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .12rem;
  color: var(--nb-purple) !important;
  border-bottom: 2px solid var(--nb-gold-dark);
  padding-bottom: .5rem;
  margin-bottom: 1.25rem;
}

@media (prefers-color-scheme: dark) {
  .nb-section-title {
    color: var(--nb-purple-light) !important;
    border-color: var(--nb-gold-dark);
  }
}

/* ── Featured post cards ── */
.nb-post-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 1rem;
}

.nb-post-card {
  display: block;
  padding: 1.1rem 1.2rem;
  border: 1px solid var(--nb-border, #e9ecef);
  border-radius: .5rem;
  text-decoration: none !important;
  transition: border-color .2s, background .2s;
  background: transparent;
}

.nb-post-card:hover {
  border-color: var(--nb-purple);
  background: rgba(112, 64, 160, .05);
}

@media (prefers-color-scheme: dark) {
  .nb-post-card { border-color: var(--nb-border); }
  .nb-post-card:hover {
    border-color: var(--nb-purple-light);
    background: rgba(112, 64, 160, .1);
  }
}

.nb-post-meta {
  font-size: .72rem;
  color: var(--nb-text-muted, #6b7280);
  margin-bottom: .4rem;
  text-transform: uppercase;
  letter-spacing: .05rem;
}

.nb-post-title {
  font-size: .95rem;
  font-weight: 600;
  margin: 0 0 .5rem;
  color: var(--body-font-color);
  line-height: 1.4;
}

.nb-post-desc {
  font-size: .82rem;
  color: var(--nb-text-muted, #6b7280);
  margin: 0;
  line-height: 1.5;
}

/* ── Post list ── */
.nb-list-item {
  display: flex;
  align-items: flex-start;
  gap: 1.2rem;
  padding: .85rem 0;
  border-bottom: 1px solid var(--nb-border, #f0f0f0);
}

@media (prefers-color-scheme: dark) {
  .nb-list-item { border-color: var(--nb-border); }
}

.nb-list-meta {
  flex-shrink: 0;
  font-size: .72rem;
  color: var(--nb-text-muted, #6b7280);
  padding-top: .2rem;
  min-width: 90px;
}

.nb-list-body { flex: 1; }

.nb-list-title {
  font-size: .95rem;
  font-weight: 600;
  color: var(--body-font-color) !important;
  text-decoration: none;
  display: block;
  margin-bottom: .25rem;
}

.nb-list-title:hover {
  color: var(--nb-purple-light) !important;
}

.nb-list-desc {
  font-size: .82rem;
  color: var(--nb-text-muted, #6b7280);
  margin: 0;
  line-height: 1.5;
}

/* ── Single post ── */
.markdown h1,
.markdown h2,
.markdown h3 {
  font-weight: 700;
}

.markdown h2 {
  border-left: 3px solid var(--nb-gold-dark);
  padding-left: .75rem;
}

.markdown code {
  font-size: .85em;
}
</style>
